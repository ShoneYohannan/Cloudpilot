name: CloudPilot CI/CD Pipeline

on:
  push:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '22'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Install Frontend Dependencies
        run: |
          cd client
          npm ci

      - name: Build Frontend Application
        run: |
          cd client
          npm run build

  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/cloudpilot-backend:${{ github.sha }}
            ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/cloudpilot-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/cloudpilot-frontend:${{ github.sha }}
            ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/cloudpilot-frontend:latest

  deploy-to-azure:
    needs: build-push-docker
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend Container to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_SERVICE_NAME }}
          images: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/cloudpilot-backend:${{ github.sha }}

      - name: Deploy Frontend Container to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_APP_SERVICE_NAME }}
          images: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/cloudpilot-frontend:${{ github.sha }}
